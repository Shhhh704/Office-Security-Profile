# 因项目依赖 @universe-design/*，公网 CI 安装不稳定时，可仅用本工作流托管静态文件。
# 本地执行：npm run publish:office-pages（构建 dist 并推送到本仓库 gh-pages，触发此 workflow）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
